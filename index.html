// ── BELL ──────────────────────────────────────────────────────────────────────
function ringBell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const master=ctx.createGain();master.gain.value=1.0;master.connect(ctx.destination);
    [[220,3.0,0.9],[440,2.2,0.6],[880,1.5,0.35],[1760,0.9,0.15]].forEach(([f,d,v])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=f;o.connect(g);g.connect(master);
      const t=ctx.currentTime;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+d);
      o.start(t);o.stop(t+d);
    });
    setTimeout(()=>{try{
      const c2=new(window.AudioContext||window.webkitAudioContext)();
      const m2=c2.createGain();m2.gain.value=0.7;m2.connect(c2.destination);
      [[220,1.8,0.7],[440,1.2,0.4],[880,0.8,0.2]].forEach(([f,d,v])=>{
        const o=c2.createOscillator(),g=c2.createGain();
        o.type="sine";o.frequency.value=f;o.connect(g);g.connect(m2);
        const t=c2.currentTime;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+d);
        o.start(t);o.stop(t+d);
      });
    }catch(e){}},750);
  }catch(e){}
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(prompt,max=150){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,
      messages:[{role:"user",content:prompt}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error("HTTP "+r.status+(e?.error?.message?" — "+e.error.message:""));}
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.[0]?.text?.trim()||"";
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const today=()=>new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});
function getSuggested(key,defKg){
  const hist=(ls(key)||[]).filter(e=>e.date!==today());
  if(!hist.length)return defKg||"";
  let bestKg=0,lastKg=0,lastReps=0;
  hist.slice(0,1).forEach(e=>{
    if(!e.sets)return;
    Object.entries(e.sets).forEach(([sid,v])=>{
      if(sid==="wu")return;
      const kg=parseFloat(v.kg)||0,reps=parseInt(v.reps)||0;
      if(kg>lastKg){lastKg=kg;lastReps=reps;}
    });
  });
  if(!lastKg)return defKg||"";
  if(lastReps>=10)return String(lastKg+2.5);
  if(lastReps>=8)return String(lastKg+2.5);
  return String(lastKg);
}
function getLastEntry(key){
  return (ls(key)||[]).find(e=>e.date!==today())||null;
}
function getLastVal(key,sid,field){
  const last=getLastEntry(key);
  return last?.sets?.[sid]?.[field]||"";
}

  // Keep wlogRef current
  useEffect(()=>{
    const w={};
    Object.keys(SESSIONS).forEach(sk=>{
      let gi=0;
      SESSIONS[sk].secs.forEach(sec=>sec.ex.forEach(()=>{
        const key=sk+"_"+gi;
        const stored=ls(key);
        if(stored) w[key]=stored;
        gi++;
      }));
    });
    wlogRef.current=w;
  },[wlogTick]);

  // Save sched/comp on change
  useEffect(()=>{ls("ppl_sched",sched);},[sched]);
  useEffect(()=>{ls("ppl_comp",comp);},[comp]);

  // Muscle heatmap
  useEffect(()=>{
    const m={};
    DAYS.forEach(d=>{
      if(!sched[d]||sched[d].s==="Rest")return;
      const t=sched[d].t;
      const full=t==="push"?"rgba(255,85,51,0.85)":t==="pull"?"rgba(51,204,255,0.85)":"rgba(232,255,71,0.75)";
      const dim=t==="push"?"rgba(255,85,51,0.2)":t==="pull"?"rgba(51,204,255,0.2)":"rgba(232,255,71,0.18)";
      (MG[t]||[]).forEach(x=>{ m[x]=comp[d]?full:dim; });
    });
    setMuscleCols(m);
  },[comp,sched]);

  useEffect(()=>{chatRef.current?.scrollIntoView({behavior:"smooth"});},[chatMsgs]);

  const used=new Set(Object.values(sched).filter(Boolean).map(d=>d.s));
  const fmtT=s=>Math.floor(s/60)+":"+String(s%60).padStart(2,"0");

  // Schedule
  function chipTap(sk){
    if(used.has(sk))return;
    if(selChip===sk){setSelChip(null);setHint("");return;}
    setSelChip(sk);setHint("Now tap a day to assign "+sk);
  }
  function dayTap(day){
    if(selChip){
      const s=SESSIONS[selChip];
      const ns={...sched,[day]:{s:selChip,t:s?s.type:"rest"}};
      const nc={...comp,[day]:false};
      setSched(ns);setComp(nc);
      ls("ppl_sched",ns);ls("ppl_comp",nc);
      setSelChip(null);setHint("");
    }else if(sched[day]&&sched[day].s!=="Rest"){
      const nc={...comp,[day]:!comp[day]};
      setComp(nc);ls("ppl_comp",nc);
    }
  }
  function resetSched(){setSched({});setComp({});ls("ppl_sched",{});ls("ppl_comp",{});}

  // Session
  function startSession(sk,day){
    setSessActive(true);setSessSk(sk);setSessDay(day);setSessElapsed(0);
    clearInterval(sessRef.current);
    const t0=Date.now();
    sessRef.current=setInterval(()=>setSessElapsed(Math.floor((Date.now()-t0)/1000)),1000);
    setOpenCard(sk+"|"+day);
  }
  function finishSession(){
    clearInterval(sessRef.current);
    const m=Math.floor(sessElapsed/60),s=sessElapsed%60;
    const nc={...comp,[sessDay]:true};setComp(nc);ls("ppl_comp",nc);
    setSessActive(false);setASk(sessSk);setADur({m,s});
    setAnalysis(null);setALoad(true);
    runAnalysis(sessSk,m,s);
  }

  // Timer
  function startTimer(ex,secs){
    clearInterval(tmrRef.current);
    setTmrDur(secs);setTmrRem(secs);setTmrEx(ex);setTmrVis(true);
    tmrRef.current=setInterval(()=>setTmrRem(p=>{
      if(p<=1){clearInterval(tmrRef.current);ringBell();return 0;}return p-1;
    }),1000);
  }
  function tmrReset(){
    clearInterval(tmrRef.current);setTmrRem(tmrDur);
    tmrRef.current=setInterval(()=>setTmrRem(p=>{
      if(p<=1){clearInterval(tmrRef.current);ringBell();return 0;}return p-1;
    }),1000);
  }
  const tmrPct=tmrDur>0?(tmrRem/tmrDur)*100:0;

  // Tick set
  function tickSet(key,sid,isWu,isSplit,kg,reps,areps,akg,restSecs,exName){
    const t=today();
    const current=ls(key)||[];
    const existing=current[0];
    const done=existing?.date===t&&existing?.sets?.[sid];
    let next;
    if(done){
      const sets={...existing.sets};delete sets[sid];
      next=[{...existing,sets},...current.slice(1)];
    }else{
      let entries=current;
      if(!existing||existing.date!==t){
        entries=[{date:t,sets:{}},...current].slice(0,50);
      }
      const sd=isSplit?{kg:kg||"0",areps:areps||"",akg:akg||}:{kg:kg||"-",reps:reps||"-"};
      entries=[{...entries[0],sets:{...entries[0].sets,[sid]:sd}},...entries.slice(1)];
      next=entries;
    }
    ls(key,next);
    wlogRef.current[key]=next;
    setWlogTick(x=>x+1);
    if(!isWu&&!done){startTimer(exName,restSecs);triggerCoach(key,sid,kg,reps,areps,akg,isSplit,exName);}
  }

  // Live coach
  async function triggerCoach(key,sid,kg,reps,areps,akg,isSplit,exName){
    if(coachBusy)return;
    setCoachBusy(true);setCoachMsg("");setCoachVis(true);
    clearTimeout(coachHide.current);
    try{
      const wl=wlogRef.current;
      const t=today();
      const ts=wl[key]?.[0]?.date===t?wl[key][0].sets||{}:{};
      const prev=Object.entries(ts).filter(([k])=>k!=="wu"&&k!==sid)
        .map(([k,v])=>isSplit?`${k.toUpperCase()}:${v.kg}f`:`${k.toUpperCase()}:${v.kg}×${v.reps}`);
      const last=(wl[key]||[]).find(e=>e.date!==t);
      const lp=last?.sets?Object.entries(last.sets).slice(0,4)
        .map(([k,v])=>`${k.toUpperCase()}:${v.kg}×${v.reps||"?"}`):[];
      const ctx=isSplit?`${sid.toUpperCase()}: ${kg} free reps${areps?` + ${areps} assisted @${akg||"?"}kg`:""}`
        :`${sid.toUpperCase()}: ${kg}kg × ${reps} reps`;
      const prompt=`You are a gym coach. Give instant feedback after ONE set. Max 2 sentences. Direct and warm.
Athlete: Nick, 6ft4 male, building size, returning after 4 month break. Right wrist injury — be cautious on pushing exercises.
Exercise: ${exName}. Just logged: ${ctx}.${prev.length?" Today so far: "+prev.join(", ")+".":""}${lp.length?" Last session: "+lp.join(", ")+".":""}
Did they hit target? Next set heavier/same/lighter? One quick cue.`;
      const msg=await callClaude(prompt,100);
      setCoachMsg(msg);
      coachHide.current=setTimeout(()=>setCoachVis(false),10000);
    }catch(e){
      setCoachMsg("⚠️ "+e.message.slice(0,80));
      coachHide.current=setTimeout(()=>setCoachVis(false),6000);
    }finally{setCoachBusy(false);}
  }

  // End session analysis
  async function runAnalysis(sk,durM,durS){
    const exList=Object.values(SESSIONS[sk]?.secs||[]).flatMap(s=>s.ex);
    let vol=0,pbs=[],lines=[];
    exList.forEach((ex,i)=>{
      const key=`${sk}_${i}`,entries=ls(key)||[];
      if(!entries.length||!entries[0].sets)return;
      const todayE=entries[0],prev=entries[1],parts=[];
      Object.entries(todayE.sets).forEach(([sid,v])=>{
        if(sid==="wu")return;
        const kv=parseFloat(v.kg)||0,rv=parseInt(v.reps)||0;
        vol+=kv*rv;parts.push(`${sid.toUpperCase()}:${kv}×${rv}`);
        if(prev?.sets?.[sid]){const pk=parseFloat(prev.sets[sid].kg)||0;if(kv>pk&&pk>0)pbs.push(`${ex.n}: ${kv}kg`);}
      });
      if(parts.length)lines.push(`${ex.n}: ${parts.join(", ")}`);
    });
    const vs=vol>0?(Math.round(vol/100)/10)+"t":"--";
    try{
      const raw=await callClaude(`Expert trainer. 6ft4 male returning after 4 month break, building size.
Session: ${sk} | Duration: ${durM}m ${durS}s | Volume: ${vs} | PBs: ${pbs.join(", ")||"none"}
Sets: ${lines.join(" | ")||"none"}
Return ONLY valid JSON:
{"pros":[{"icon":"emoji","text":"specific positive"}],"build":[{"icon":"emoji","text":"coaching cue"}],"next_targets":[{"exercise":"name","today":"what they did","target":"exact next target"}],"coach_note":"2-3 sentence insight"}`,1200);
      const clean=raw.replace(/```json/g,"").replace(/```/g,"").trim();
      setAnalysis({...JSON.parse(clean),stats:{dur:`${durM}m ${durS}s`,vol:vs,pbs:pbs.length},pbList:pbs});
    }catch(e){setAnalysis({error:true,stats:{dur:`${durM}m ${durS}s`,vol:vs,pbs:pbs.length},pbList:pbs});}
    setALoad(false);
  }

  // Chat
  async function sendChat(){
    const q=chatInput.trim();if(!q||chatBusy)return;
    setChatMsgs(p=>[...p,{role:"user",text:q}]);setChatInput("");setChatBusy(true);
    const history=chatMsgs.slice(-8).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
          system:"You are a personal trainer for Nick: 6ft4 male, returning after 4 month break, building lean size especially legs. PPL 6-day programme. Right wrist injury. Key lifts: Bench 77.5kg, Pull-ups 4×6, Leg Press 120kg, Seated LC 65kg, Lunges 32kg. Be direct and specific.",
          messages:[...history,{role:"user",content:q}]})
      });
      if(!r.ok)throw new Error("HTTP "+r.status);
      const d=await r.json();
      setChatMsgs(p=>[...p,{role:"ai",text:d.content?.[0]?.text?.trim()||"No response."}]);
    }catch(e){setChatMsgs(p=>[...p,{role:"ai",text:"⚠️ "+e.message}]);}
    setChatBusy(false);
  }

  function getSetDone(key,sid){
    const t=today();
    const stored=ls(key)||[];
    return !!(stored[0]?.date===t&&stored[0]?.sets?.[sid]);
  }

  const assignedDays=DAYS.filter(d=>sched[d]&&sched[d].s!=="Rest");
  const doneDays=assignedDays.filter(d=>comp[d]);
  const weekMins=(ls("ppl_sesshist")||[]).filter(e=>{
    try{const d=new Date();const p=e.date.split(" ");const m={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};const ed=new Date(d.getFullYear(),m[p[1]],parseInt(p[0]));return(d-ed)<7*24*60*60*1000;}catch(er){return false;}
  }).reduce((a,e)=>a+(e.m||0),0);
  const wH=Math.floor(weekMins/60),wM=weekMins%60;
  const wTimeStr=wH>0?`${wH}h ${wM}m`:(weekMins>0?`${weekMins}m`:"0m");

  const st={fontSize:9,letterSpacing:4,textTransform:"uppercase",fontFamily:"Space Mono,monospace"};
  const bc={background:C.sur,border:"1px solid "+C.bdr,borderRadius:4};

  return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"Barlow,sans-serif",fontWeight:300,paddingBottom:100}}>

      {/* SESSION BAR */}
      {sessActive&&(
        <div style={{position:"sticky",top:0,zIndex:300,background:"rgba(4,4,10,0.97)",borderBottom:"2px solid "+C.acc,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",backdropFilter:"blur(20px)"}}>
          <div>
            <div style={{...st,color:C.muted,marginBottom:2}}>{sessSk} · {sessDay}</div>
            <div style={{fontFamily:"Space Mono,monospace",fontSize:32,fontWeight:700,color:C.acc,lineHeight:1,letterSpacing:2}}>{fmtT(sessElapsed)}</div>
          </div>
          <button onClick={finishSession} style={{background:"transparent",border:"1px solid "+C.red,color:C.red,borderRadius:4,padding:"9px 18px",fontSize:9,cursor:"pointer",letterSpacing:3,textTransform:"uppercase",fontWeight:700,fontFamily:"Space Mono,monospace"}}>FINISH</button>
        </div>
      )}

      {/* TAB BAR */}
      <div style={{display:"flex",borderBottom:"1px solid "+C.bdr,background:"rgba(4,4,10,0.95)",position:"sticky",top:sessActive?56:0,zIndex:200,backdropFilter:"blur(16px)"}}>
        {[["plan","PLAN"],["progress","PROGRESS"],["chat","COACH"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"13px 4px",border:"none",background:"none",color:tab===t?C.acc:C.muted,fontSize:9,fontWeight:700,letterSpacing:3,textTransform:"uppercase",cursor:"pointer",borderBottom:tab===t?"2px solid "+C.acc:"2px solid transparent",transition:"all 0.2s",fontFamily:"Space Mono,monospace"}}>{l}</button>
        ))}
      </div>

      {/* ── PLAN TAB ── */}
      {tab==="plan"&&(
        <div style={{padding:"16px 14px"}}>
          {/* Header */}
          <div style={{marginBottom:24,paddingBottom:20,borderBottom:"1px solid "+C.bdr}}>
            <div style={{...st,color:C.acc,marginBottom:8}}>/ TRAINING PROGRAMME</div>
            <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:68,fontWeight:900,lineHeight:0.85,letterSpacing:-1,marginBottom:8}}>
              <span style={{color:C.push}}>PUSH</span>
              <span style={{color:C.muted,fontSize:36,margin:"0 6px"}}>·</span>
              <span style={{color:C.pull}}>PULL</span>
              <span style={{color:C.muted,fontSize:36,margin:"0 6px"}}>·</span>
              <span style={{color:C.legs}}>LEGS</span>
            </div>
            <div style={{...st,color:C.muted}}>6 DAYS · COMMERCIAL GYM · HYPERTROPHY</div>
          </div>

          {/* Weekly stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
            {[
              {v:`${doneDays.length}/${assignedDays.length}`,l:"Sessions"},
              {v:wTimeStr,l:"This Week"},
              {v:doneDays.length===assignedDays.length&&assignedDays.length>0?"DONE":"GO",l:"Status",col:doneDays.length===assignedDays.length&&assignedDays.length>0?C.acc:C.dim},
            ].map((s,i)=>(
              <div key={i} style={{...bc,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontFamily:"Space Mono,monospace",fontSize:22,fontWeight:700,color:s.col||C.acc,lineHeight:1}}>{s.v}</div>

          </div>

          {/* Heatmap */}
          <div style={{...bc,padding:12,marginBottom:20}}>
            <div style={{...st,color:C.muted,marginBottom:8,fontSize:8}}>
              {Object.keys(muscleCols).length>0?"THIS WEEK — MUSCLES TRAINED":"ASSIGN SESSIONS TO SEE MUSCLE MAP"}

            <BodyDual colorMap={muscleCols}/>
          </div>

          {/* Schedule */}
          <div style={{marginBottom:20}}>
            <div style={{...st,color:C.acc,marginBottom:8,fontSize:8}}>① PICK SESSION  ② TAP DAY  ·  TAP ASSIGNED DAY TO MARK DONE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
              {Object.entries(SESSIONS).map(([sk,s])=>{
                const u=used.has(sk),sel=selChip===sk,col=tCol[s.type]||C.muted;
                const rgb=s.type==="push"?"255,85,51":s.type==="pull"?"51,204,255":"232,255,71";

          {/* Session cards */}

          {DAYS.filter(d=>sched[d]).map(day=>{
            const sk=sched[day].s;
            if(sk==="Rest")return(
              <div key={day} style={{...bc,marginBottom:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{...st,color:C.muted,fontSize:8,borderLeft:"2px solid "+C.muted,paddingLeft:8}}>REST</div>
                  <div>
                    <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:700}}>{day}</div>
                    <div style={{fontSize:11,color:C.muted}}>Cold plunge. Foam roll. Sleep well.</div>

                </div>

            );
            const s=SESSIONS[sk];if(!s)return null;
            const col=tCol[s.type]||C.muted;
            const cardId=sk+"|"+day;
            const isOpen=openCard===cardId;
            const isDone=comp[day];
            const isActive=sessActive&&sessSk===sk&&sessDay===day;
            let gi=0;
            return(
              <div key={cardId} style={{background:isDone?"rgba(232,255,71,0.03)":C.sur,border:`1px solid ${isDone?"rgba(232,255,71,0.2)":isOpen?"#2a2a3e":C.bdr}`,borderRadius:6,marginBottom:10,overflow:"hidden",transition:"all 0.3s"}}>
                <div onClick={()=>setOpenCard(isOpen?null:cardId)} style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{...st,color:col,borderLeft:`2px solid ${col}`,paddingLeft:8,fontSize:8}}>{sk}</div>
                    <div>
                      <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:700,lineHeight:1,color:isDone?C.acc:C.text}}>
                        {day}{isDone?" ✓":""}
                      </div>
                      <div style={{fontSize:11,color:C.muted,marginTop:1}}>{s.sub}</div>
                    </div>
                  </div>
                  <div style={{color:C.muted,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.25s",fontSize:14}}>▼</div>
                </div>

                {isOpen&&(
                  <div style={{padding:"0 16px 16px"}}>
                    <div style={{height:1,background:C.bdr,marginBottom:14}}/>

                    {!isActive&&!sessActive&&(
                      <button onClick={()=>startSession(sk,day)} style={{width:"100%",background:C.acc,border:"none",borderRadius:4,padding:13,fontSize:10,fontWeight:700,letterSpacing:4,cursor:"pointer",color:"#000",marginBottom:14,fontFamily:"Space Mono,monospace"}}>START SESSION</button>
                    )}
                    {isActive&&<div style={{textAlign:"center",...st,color:C.acc,fontSize:8,marginBottom:14}}>SESSION IN PROGRESS</div>}

                    {/* Warm up */}
                    <div style={{borderLeft:"2px solid "+C.gold,paddingLeft:12,marginBottom:16}}>
                      <div style={{...st,color:C.gold,fontSize:8,marginBottom:8}}>WARM UP — 3-5 MINS</div>
                      {s.wu.map((w,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:i<s.wu.length-1?"1px solid rgba(255,204,0,0.08)":"none",gap:8}}>
                          <div style={{fontWeight:500,fontSize:12,flex:1}}>{w.n}</div>
                          <div style={{fontSize:11,color:C.muted,flex:2}}>{w.d}</div>
                          <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:13,fontWeight:700,color:C.gold,whiteSpace:"nowrap"}}>{w.t}</div>
                        </div>
                      ))}
                    </div>

                    {s.secs.map((sec,si)=>(
                      <div key={si}>
                        <div style={{...st,color:C.muted,fontSize:8,margin:"14px 0 8px"}}>{sec.l}</div>
                        {sec.ex.map(ex=>{const idx=gi++;return(
                          <ExBlock key={idx} ex={ex} idx={idx} sk={sk}
                            onTick={tickSet} getSetDone={getSetDone}
                            getLastVal={getLastVal} getLastEntry={getLastEntry}
                            getSuggested={getSuggested} wlogTick={wlogTick}/>
                        );})}
                      </div>
                    ))}

                    <div style={{fontSize:11,color:C.muted,lineHeight:1.7,marginTop:12,paddingTop:10,borderTop:"1px solid "+C.bdr}}>{s.note}</div>

                    <div style={{borderLeft:"2px solid "+C.acc,paddingLeft:12,marginTop:14}}>
                      <div style={{...st,color:C.acc,fontSize:8,marginBottom:8}}>POST-SESSION RECOVERY</div>
                      {[{n:"Foam Roll",d:s.rcv.foam,t:s.rcv.ft},{n:"Hydro Massage",d:"Full body",t:"10 MIN"},{n:"Hot Sauna",d:"Flush waste, increase blood flow",t:"10 MIN"},{n:"Cold Plunge",d:"Rest days ONLY — blunts muscle growth",t:"AVOID"},{n:"Steam Room",d:"Relax and finish",t:"5 MIN"}].map((r,i,arr)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:i<arr.length-1?"1px solid rgba(232,255,71,0.07)":"none",gap:8}}>
                          <div style={{fontWeight:500,fontSize:12}}>{r.n}</div>
                          <div style={{fontSize:11,color:C.muted,flex:1,margin:"0 8px"}}>{r.d}</div>
                          <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:13,fontWeight:700,color:C.acc,whiteSpace:"nowrap"}}>{r.t}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {/* Analysis panel */}
          {(analysis||aLoad)&&<AnalysisPanel sk={aSk} dur={aDur} loading={aLoad} data={analysis} onClose={()=>{setAnalysis(null);setALoad(false);}}/>}
        </div>
      )}

      {/* ── PROGRESS TAB ── */}
      {tab==="progress"&&<ProgressTab wlogTick={wlogTick}/>}

      {/* ── CHAT TAB ── */}
      {tab==="chat"&&(
        <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 88px)"}}>
          <div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px"}}>
            {chatMsgs.map((m,i)=>(
              <div key={i} style={{marginBottom:12,display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"88%",padding:"10px 14px",borderRadius:4,
                  background:m.role==="user"?"rgba(232,255,71,0.07)":C.sur,
                  border:`1px solid ${m.role==="user"?"rgba(232,255,71,0.15)":C.bdr}`,
                  borderLeft:m.role==="user"?"none":"2px solid "+C.pull,
                  fontSize:13,lineHeight:1.6,color:C.text,whiteSpace:"pre-wrap"}}>{m.text}</div>
              </div>
            ))}
            {chatBusy&&<div style={{display:"flex",gap:5,marginBottom:12,paddingLeft:4}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.pull,animation:`pulse 0.6s ${i*0.2}s infinite`}}/>)}
            </div>}
            <div ref={chatRef}/>
          </div>
          <div style={{padding:"10px 14px 24px",borderTop:"1px solid "+C.bdr,background:"rgba(4,4,10,0.97)",display:"flex",gap:8,alignItems:"flex-end"}}>
            <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}}
              placeholder="Ask about form, weights, recovery, nutrition..."
              rows={2} style={{flex:1,background:C.sur,border:"1px solid "+C.bdr,borderRadius:4,color:C.text,padding:"10px 12px",fontSize:13,resize:"none",lineHeight:1.5}}/>
            <button onClick={sendChat} disabled={chatBusy||!chatInput.trim()} style={{background:chatInput.trim()?C.acc:"#1a1a2e",border:"none",color:chatInput.trim()?"#000":C.muted,borderRadius:4,padding:"10px 14px",fontSize:9,cursor:"pointer",fontWeight:700,letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap",alignSelf:"stretch",fontFamily:"Space Mono,monospace"}}>SEND</button>
          </div>
        </div>
      )}

      {/* COACH BUBBLE */}
      {coachVis&&(
        <div style={{position:"fixed",bottom:tmrVis?136:16,left:12,right:12,zIndex:600,
          background:"rgba(4,4,10,0.98)",border:`1px solid ${coachBusy?"rgba(51,204,255,0.5)":"rgba(51,204,255,0.3)"}`,
          borderRadius:6,padding:"14px 44px 14px 52px",fontSize:13,color:C.text,lineHeight:1.6,
          boxShadow:"0 8px 40px rgba(0,0,0,0.9)",animation:"slideUp 0.2s ease",backdropFilter:"blur(24px)"}}>
          <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",
            fontSize:8,letterSpacing:2,fontWeight:700,color:C.pull,fontFamily:"Space Mono,monospace",
            border:"1px solid rgba(51,204,255,0.3)",borderRadius:2,padding:"3px 5px"}}>AI</div>
          <button onClick={()=>setCoachVis(false)} style={{position:"absolute",top:8,right:10,
            background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
          {coachBusy
            ?<div style={{display:"flex",alignItems:"center",gap:10}}>
               <div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:C.pull,animation:`pulse 0.6s ${i*0.15}s infinite`}}/>)}</div>
               <span style={{color:C.pull,fontSize:10,letterSpacing:2,fontFamily:"Space Mono,monospace"}}>READING YOUR SET...</span>
             </div>
            :<span>{coachMsg}</span>}
        </div>
      )}

      {/* REST TIMER */}
      {tmrVis&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:500,
          background:"rgba(4,4,10,0.98)",borderTop:`2px solid ${tmrRem===0?C.acc:tmrRem<=10?C.red:C.bdr}`,
          padding:"12px 16px 28px",backdropFilter:"blur(24px)",transition:"border-color 0.3s"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <div style={{...st,color:C.muted,fontSize:8,marginBottom:4}}>{tmrEx}</div>
              <div style={{fontFamily:"Space Mono,monospace",fontSize:42,fontWeight:700,lineHeight:1,letterSpacing:3,
                color:tmrRem===0?C.acc:tmrRem<=10?C.red:C.acc,
                animation:tmrRem===0?"pulse 0.4s ease infinite alternate":"none"}}>
                {tmrRem===0?"GO!":fmtT(tmrRem)}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={tmrReset} style={{background:"transparent",border:"1px solid "+C.bdr,color:C.muted,borderRadius:4,padding:"8px 14px",fontSize:8,cursor:"pointer",letterSpacing:2,textTransform:"uppercase",fontFamily:"Space Mono,monospace",fontWeight:700}}>RESET</button>
              <button onClick={()=>{clearInterval(tmrRef.current);setTmrVis(false);}} style={{background:"rgba(232,255,71,0.08)",border:"1px solid rgba(232,255,71,0.2)",color:C.acc,borderRadius:4,padding:"8px 14px",fontSize:8,cursor:"pointer",letterSpacing:2,textTransform:"uppercase",fontFamily:"Space Mono,monospace",fontWeight:700}}>SKIP</button>
            </div>
          </div>
          <div style={{height:4,background:C.sur2,borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:2,background:tmrRem<=10?C.red:C.acc,width:tmrPct+"%",transition:"width 0.9s linear,background 0.3s"}}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ── EXERCISE BLOCK ─────────────────────────────────────────────────────────────
function ExBlock({ex,idx,sk,onTick,getSetDone,getLastVal,getLastEntry,getSuggested,wlogTick}){
  const key=`${sk}_${idx}`;
  const [rest,setRest]=useState(90);
  const [extra,setExtra]=useState(0);
  const [tipsOpen,setTipsOpen]=useState(false);
  const [vals,setVals]=useState(()=>ls("ppl_iv_"+key)||{});
  const [noteOpen,setNoteOpen]=useState(false);
  const [note,setNote]=useState(()=>ls("ppl_note_"+key)||"");
  const [noteSaved,setNoteSaved]=useState(false);
  const isSplit=ex.splitLog||false;
  const numSets=ex.s+extra;
  const sids=["wu",...Array.from({length:numSets},(_,i)=>"s"+(i+1))];
  const allDone=sids.filter(s=>s!=="wu").every(sid=>getSetDone(key,sid));
  const suggested=getSuggested(key,ex.def?.kg);

  function sv(sid,f,v){
    const next={...vals,[sid]:{...(vals[sid]||{}),[f]:v}};
    setVals(next);ls("ppl_iv_"+key,next);
  }
  function gv(sid,f){return vals[sid]?.[f]??"";}

  function handleTick(sid){
    const isWu=sid==="wu";
    const kg=gv(sid,"kg")||getLastVal(key,sid,"kg")||suggested||ex.def?.kg||"";
    const reps=gv(sid,"reps")||getLastVal(key,sid,"reps")||ex.def?.reps||"";
    const areps=gv(sid,"areps")||getLastVal(key,sid,"areps")||"";
    const akg=gv(sid,"akg")||getLastVal(key,sid,"akg")||"";
    onTick(key,sid,isWu,isSplit,kg,reps,areps,akg,rest,ex.n);
  }

  const last=getLastEntry(key);
  const lastStr=last?.sets?Object.entries(last.sets).slice(0,5).map(([k,v])=>{
    const l=k==="wu"?"WU":k.toUpperCase();
    if(isSplit)return `${l}:${v.kg}f${v.areps?"/"+v.areps+"@"+(v.akg||"?"):""}`;
    return `${l}:${v.kg}×${v.reps}`;
  }).join(" | "):null;

  const st={fontSize:9,letterSpacing:4,textTransform:"uppercase",fontFamily:"Space Mono,monospace"};

  return(
    <div style={{padding:12,borderRadius:4,marginBottom:10,
      background:allDone?"rgba(232,255,71,0.04)":C.sur2,
      border:`1px solid ${allDone?"rgba(232,255,71,0.2)":C.bdr}`,
      transition:"all 0.3s"}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div style={{fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,fontSize:15,textTransform:"uppercase",letterSpacing:0.5,color:allDone?C.acc:C.text,flex:1,paddingRight:8}}>{ex.n}</div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:700,color:C.acc}}>{ex.s}<span style={{color:C.dim}}>×</span>{ex.rng}</div>
          <div style={{...st,color:C.muted,fontSize:7}}>{ex.sl||"SETS × REPS"}</div>
        </div>
      </div>

      <div style={{fontSize:11,color:C.dim,marginBottom:6,lineHeight:1.5}}>{ex.o}</div>

      {suggested&&suggested!==ex.def?.kg&&(
        <div style={{...st,color:C.acc,fontSize:8,marginBottom:6}}>↑ SUGGESTED TODAY: {suggested}kg</div>
      )}

      {ex.muscles&&ex.muscles.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
          {ex.muscles.map(m=><span key={m} style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"rgba(232,255,71,0.6)",border:"1px solid rgba(232,255,71,0.15)",borderRadius:2,padding:"2px 6px",fontFamily:"Space Mono,monospace"}}>{m.replace("-"," ")}</span>)}
        </div>
      )}

      {ex.tips&&(
        <>
          <button onClick={()=>setTipsOpen(o=>!o)} style={{...st,color:tipsOpen?C.acc:C.muted,background:"none",border:"none",cursor:"pointer",padding:"2px 0",marginBottom:6,fontSize:8}}>{tipsOpen?"▲ HIDE TIPS":"▼ FORM TIPS"}</button>
          {tipsOpen&&(
            <div style={{borderLeft:"2px solid rgba(232,255,71,0.2)",paddingLeft:10,marginBottom:8}}>
              {ex.tips.map((t,i)=>(
                <div key={i} style={{fontSize:11,color:C.muted,lineHeight:1.7,paddingLeft:8,position:"relative"}}>
                  <span style={{position:"absolute",left:0,color:C.acc}}>—</span>{t}
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* Set table */}
      <div style={{marginBottom:6}}>
        <div style={{display:"grid",gridTemplateColumns:isSplit?"28px 1fr 1fr 1fr 36px":"28px 1fr 1fr 36px",gap:4,marginBottom:4}}>
          <div/>
          {isSplit?<>
            <div style={{...st,color:C.acc,textAlign:"center",fontSize:7}}>FREE</div>
            <div style={{...st,color:C.pull,textAlign:"center",fontSize:7}}>+REPS</div>
            <div style={{...st,color:C.pull,textAlign:"center",fontSize:7}}>-KG</div>
          </>:<>
            <div style={{...st,color:C.muted,textAlign:"center",fontSize:7}}>KG</div>
            <div style={{...st,color:C.muted,textAlign:"center",fontSize:7}}>REPS</div>
          </>}
          <div/>
        </div>
        {sids.map(sid=>{
          const isWu=sid==="wu",done=getSetDone(key,sid);
          const lKg=getLastVal(key,sid,"kg"),lReps=getLastVal(key,sid,"reps");
          const lAr=getLastVal(key,sid,"areps"),lAk=getLastVal(key,sid,"akg");
          const ph=(f)=>{
            if(f==="kg")return lKg||suggested||ex.def?.kg||"";
            if(f==="reps")return lReps||ex.def?.reps||"";
            if(f==="areps")return lAr||"";
            return lAk||"";
          };
          const inp=(f,isA)=>(
            <div>
              <input value={gv(sid,f)} onChange={e=>sv(sid,f,e.target.value)}
                placeholder={ph(f)||"—"} inputMode={f==="reps"||f==="areps"?"numeric":"decimal"}
                style={{background:"#0a0a14",border:`1px solid ${isA?"rgba(51,204,255,0.2)":C.bdr}`,borderRadius:3,
                  color:isA?"rgba(51,204,255,0.9)":C.text,padding:"8px 4px",fontSize:14,textAlign:"center",
                  width:"100%",WebkitAppearance:"none",fontFamily:"Space Mono,monospace",fontWeight:700}}/>
              {ph(f)&&<div style={{fontSize:8,color:"#2a2a3a",textAlign:"center",marginTop:1}}>{ph(f)}</div>}
            </div>
          );
          return(
            <div key={sid} style={{display:"grid",gridTemplateColumns:isSplit?"28px 1fr 1fr 1fr 36px":"28px 1fr 1fr 36px",gap:4,marginBottom:5,alignItems:"center",opacity:done?0.55:1}}>
              <span style={{...st,color:isWu?C.gold:C.acc,textAlign:"center",fontSize:9}}>{isWu?"WU":sid.toUpperCase()}</span>
              {isSplit?<>{inp("kg",false)}{inp("areps",true)}{inp("akg",true)}</>
                :<>{inp("kg",false)}{inp("reps",false)}</>}
              <button onClick={()=>handleTick(sid)} style={{width:36,height:36,borderRadius:3,
                border:`1.5px solid ${done?C.acc:"#2a2a3e"}`,background:done?C.acc:"transparent",
                cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",
                color:done?"#000":"transparent",flexShrink:0,transition:"all 0.15s",
                transform:done?"scale(1.05)":"none"}}>✓</button>
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",gap:8,margin:"6px 0 8px"}}>
        <button onClick={()=>setExtra(e=>e+1)} style={{background:"transparent",border:"1px solid "+C.bdr,color:C.muted,borderRadius:3,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>+ Set</button>
        <button onClick={()=>setExtra(e=>Math.max(0,e-1))} style={{background:"transparent",border:"1px solid "+C.bdr,color:C.muted,borderRadius:3,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>− Set</button>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:6}}>
        <span style={{...st,color:C.muted,fontSize:7}}>REST:</span>
        {[60,90,120,180].map(s=>(
          <button key={s} onClick={()=>setRest(s)} style={{background:rest===s?"rgba(255,51,85,0.1)":"transparent",border:`1px solid ${rest===s?C.red:C.bdr}`,color:rest===s?C.red:C.muted,borderRadius:3,padding:"4px 10px",fontSize:9,cursor:"pointer",fontFamily:"Space Mono,monospace",letterSpacing:1}}>
            {s<120?s+"s":(s/60)+"m"}
          </button>
        ))}
      </div>

      {lastStr&&<div style={{fontSize:10,color:"#3a3a4a",marginBottom:6,lineHeight:1.4}}>Last: {lastStr}</div>}

      <button onClick={()=>setNoteOpen(o=>!o)} style={{...st,color:C.muted,background:"none",border:"none",cursor:"pointer",padding:"3px 0",display:"block",fontSize:7}}>
        NOTES{note?" (1)":""}
      </button>
      {noteOpen&&(
        <div style={{marginTop:6}}>
          <textarea value={note} onChange={e=>setNote(e.target.value)}
            placeholder="e.g. felt strong, form broke on last set..."
            style={{background:C.sur,border:"1px solid "+C.bdr,borderRadius:3,color:C.text,padding:"8px 10px",fontSize:12,width:"100%",resize:"none",minHeight:48,lineHeight:1.5}}/>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
            <button onClick={()=>{ls("ppl_note_"+key,note);setNoteSaved(true);setTimeout(()=>setNoteSaved(false),1500);}} style={{background:"transparent",border:"1px solid "+C.bdr,color:C.muted,borderRadius:3,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>Save</button>
            {noteSaved&&<span style={{fontSize:10,color:C.acc}}>Saved</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── PROGRESS TAB ───────────────────────────────────────────────────────────────
function ProgressTab({wlogTick}){
  const [selSk,setSelSk]=useState("Push A");
  const [selEx,setSelEx]=useState(0);
  const sess=SESSIONS[selSk];
  const exList=sess?sess.secs.flatMap(s=>s.ex):[];
  const ex=exList[selEx];
  const key=selSk+"_"+selEx;
  const history=(ls(key)||[]).slice().reverse();
  const points=history.map(e=>{
    if(!e.sets)return null;
    let mx=0;
    Object.entries(e.sets).forEach(([sid,v])=>{if(sid!=="wu"){const k=parseFloat(v.kg)||0;if(k>mx)mx=k;}});
    return mx>0?{date:e.date,kg:mx,sets:e.sets}:null;
  }).filter(Boolean);
  const allKgs=points.map(p=>p.kg);
  const pbKg=allKgs.length?Math.max(...allKgs):0;
  const lastKg=allKgs[allKgs.length-1]||0;
  const trend=allKgs.length>1?lastKg-allKgs[0]:0;
  const tCol2={push:C.push,pull:C.pull,legs:C.acc};
  const st={fontSize:8,letterSpacing:3,textTransform:"uppercase",fontFamily:"Space Mono,monospace"};

  function buildChart(){
    if(points.length<2)return null;
    const W=260,H=70,pad=8;
    const minV=Math.min(...allKgs)*0.96,maxV=Math.max(...allKgs)*1.04,range=maxV-minV||1;
    const coords=points.map((p,i)=>({x:pad+(i/(points.length-1))*(W-pad*2),y:H-pad-((p.kg-minV)/range)*(H-pad*2),p}));
    const lp="M"+coords.map(c=>c.x+","+c.y).join(" L");
    const ap=lp+" L"+(W-pad)+","+(H-pad)+" L"+pad+","+(H-pad)+" Z";
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:70,display:"block",marginTop:8}}>
        <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="rgba(232,255,71,0.3)"/><stop offset="100%" stopColor="rgba(232,255,71,0)"/></linearGradient></defs>
        <path d={ap} fill="url(#cg)"/>
        <path d={lp} fill="none" stroke="rgba(232,255,71,0.85)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {coords.map((c,i)=>(
          <g key={i}>
            <circle cx={c.x} cy={c.y} r={i===coords.length-1?4:2.5} fill={i===coords.length-1?C.acc:"rgba(232,255,71,0.5)"}/>
            {i===coords.length-1&&<text x={c.x} y={c.y-6} fill={C.acc} fontSize="8" textAnchor="middle" fontFamily="Space Mono,monospace">{c.p.kg}kg</text>}
            {(i===0||i===coords.length-1)&&<text x={i===0?pad:W-pad} y={H-1} fill="#2a2a3a" fontSize="7" textAnchor={i===0?"start":"end"} fontFamily="Space Mono,monospace">{c.p.date}</text>}
          </g>
        ))}
      </svg>
    );
  }

  return(
    <div style={{padding:"16px 14px 120px"}}>
      <div style={{...st,color:C.acc,marginBottom:8,fontSize:8}}>/ PROGRESS</div>
      <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:56,fontWeight:900,lineHeight:.85,marginBottom:20,letterSpacing:-1}}>YOUR<br/>LIFTS</div>

      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
        {Object.entries(SESSIONS).map(([sk,s])=>{
          const col=tCol2[s.type]||C.muted;
          const rgb=s.type==="push"?"255,85,51":s.type==="pull"?"51,204,255":"232,255,71";
          return(
            <button key={sk} onClick={()=>{setSelSk(sk);setSelEx(0);}}
              style={{background:selSk===sk?`rgba(${rgb},0.18)`:`rgba(${rgb},0.05)`,color:selSk===sk?col:C.muted,border:`1px solid ${selSk===sk?col:`rgba(${rgb},0.2)`}`,borderRadius:3,padding:"6px 10px",fontSize:8,fontWeight:700,cursor:"pointer",letterSpacing:2,fontFamily:"Space Mono,monospace"}}>{sk}</button>
          );
        })}
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
        {exList.map((e,i)=>{
          const hasData=(ls(selSk+"_"+i)||[]).length>0;
          return(
            <button key={i} onClick={()=>setSelEx(i)}
              style={{background:selEx===i?"rgba(232,255,71,0.1)":C.sur,color:selEx===i?C.acc:hasData?"#888":C.muted,border:`1px solid ${selEx===i?"rgba(232,255,71,0.3)":hasData?"#252535":C.bdr}`,borderRadius:3,padding:"5px 9px",fontSize:10,cursor:"pointer",position:"relative"}}>
              {e.n.length>14?e.n.slice(0,13)+"…":e.n}
              {hasData&&<span style={{position:"absolute",top:2,right:2,width:4,height:4,borderRadius:"50%",background:C.acc}}/>}
            </button>
          );
        })}
      </div>

      {ex&&(
        <div style={{background:C.sur,border:"1px solid "+C.bdr,borderRadius:4,padding:14,marginBottom:14}}>
          <div style={{fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,fontSize:18,textTransform:"uppercase",marginBottom:4}}>{ex.n}</div>
          <div style={{fontSize:11,color:C.dim,marginBottom:12}}>{ex.o}</div>
          {points.length>0?(
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                {[{v:pbKg+"kg",l:"ALL-TIME PB"},{v:lastKg+"kg",l:"LAST SESSION"},{v:(trend>=0?"+":"")+Math.round(trend*10)/10+"kg",l:"TREND",col:trend>=0?C.acc:C.red}].map((s,i)=>(
                  <div key={i} style={{background:"rgba(232,255,71,0.04)",border:"1px solid rgba(232,255,71,0.12)",borderRadius:3,padding:"10px 8px",textAlign:"center"}}>
                    <div style={{fontFamily:"Space Mono,monospace",fontSize:18,fontWeight:700,color:s.col||C.acc,lineHeight:1}}>{s.v}</div>
                    <div style={{...st,color:C.muted,marginTop:3,fontSize:7}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <div style={{borderTop:"1px solid "+C.bdr,paddingTop:10}}>
                <div style={{...st,color:C.muted,fontSize:7,marginBottom:2}}>TOP SET WEIGHT OVER TIME</div>
                {buildChart()}
              </div>
              <div style={{borderTop:"1px solid "+C.bdr,paddingTop:12,marginTop:12}}>
                <div style={{...st,color:C.muted,fontSize:7,marginBottom:10}}>SESSION HISTORY</div>
                {[...history].reverse().slice(0,8).map((e,i)=>{
                  if(!e.sets)return null;
                  const parts=Object.entries(e.sets).filter(([sid])=>sid!=="wu").map(([sid,v])=>(
                    <span key={sid} style={{background:"rgba(232,255,71,0.05)",border:"1px solid rgba(232,255,71,0.1)",borderRadius:2,padding:"2px 5px",fontSize:9,marginRight:3,display:"inline-block",marginBottom:2,fontFamily:"Space Mono,monospace"}}>
                      {sid.toUpperCase()}: {v.kg}×{v.reps}
                    </span>
                  ));
                  return(
                    <div key={i} style={{padding:"8px 0",borderBottom:i<7?"1px solid "+C.bdr:"none"}}>
                      <div style={{...st,color:C.muted,fontSize:7,marginBottom:4}}>{e.date}</div>
                      <div>{parts}</div>
                    </div>
                  );
                })}
              </div>
            </>
          ):(
            <div style={{textAlign:"center",padding:"20px 0",color:C.muted}}>
              <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,color:"#1a1a2e",marginBottom:6}}>NO DATA YET</div>
              Log this exercise to see your progress
            </div>
          )}
        </div>
      )}

      <div style={{background:C.sur,border:"1px solid "+C.bdr,borderRadius:4,padding:14}}>
        <div style={{...st,color:C.muted,fontSize:7,marginBottom:12}}>{selSk} — ALL EXERCISES</div>
        {exList.map((e,i)=>{
          const k=selSk+"_"+i, entries=ls(k)||[];
          if(!entries.length)return null;
          let best=0;
          entries[0]?.sets&&Object.entries(entries[0].sets).forEach(([sid,v])=>{if(sid!=="wu"){const kg=parseFloat(v.kg)||0;if(kg>best)best=kg;}});
          let allBest=0;
          entries.forEach(en=>en.sets&&Object.entries(en.sets).forEach(([sid,v])=>{if(sid!=="wu"){const kg=parseFloat(v.kg)||0;if(kg>allBest)allBest=kg;}}));
          const isPb=best>=allBest&&allBest>0&&entries.length>1;
          return(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid "+C.bdr}}>
              <div style={{fontSize:12,fontWeight:500,flex:1,paddingRight:8}}>{e.n}</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:11,color:C.muted,fontFamily:"Space Mono,monospace"}}>{best}kg</span>
                {isPb&&<span style={{fontSize:7,color:C.acc,background:"rgba(232,255,71,0.08)",border:"1px solid rgba(232,255,71,0.2)",borderRadius:2,padding:"1px 5px",letterSpacing:2,fontFamily:"Space Mono,monospace"}}>PB</span>}
              </div>
            </div>
          );
        }).filter(Boolean)}
      </div>
    </div>
  );
}

// ── ANALYSIS PANEL ─────────────────────────────────────────────────────────────
function AnalysisPanel({sk,dur,loading,data,onClose}){
  const [open,setOpen]=useState(true);
  const st={fontSize:8,letterSpacing:3,textTransform:"uppercase",fontFamily:"Space Mono,monospace"};
  return(
    <div style={{background:C.sur,border:"1px solid rgba(232,255,71,0.2)",borderRadius:6,marginBottom:12,overflow:"hidden",animation:"slideUp 0.3s ease"}}>
      <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{...st,color:C.pull,borderLeft:"2px solid "+C.pull,paddingLeft:8,fontSize:7}}>AI COACH</div>
          <div>
            <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:700}}>{sk} Complete</div>
            <div style={{fontSize:11,color:C.muted}}>{dur.m}m {dur.s}s · {open?"Collapse":"Expand"}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.25s",fontSize:12}}>▼</div>
          <button onClick={e=>{e.stopPropagation();onClose();}} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer"}}>×</button>
        </div>
      </div>
      {open&&(
        <div style={{padding:"0 16px 16px"}}>
          {loading&&<div style={{textAlign:"center",padding:24,color:C.muted}}>
            <div style={{width:20,height:20,border:"2px solid "+C.bdr,borderTopColor:C.acc,borderRadius:"50%",animation:"spin 0.7s linear infinite",margin:"0 auto 10px"}}/>
            Analysing your session...
          </div>}
          {data&&<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
              {[{v:data.stats.dur,l:"Duration"},{v:data.stats.vol,l:"Volume"},{v:data.stats.pbs,l:"New PBs"}].map((s,i)=>(
                <div key={i} style={{background:"rgba(232,255,71,0.05)",border:"1px solid rgba(232,255,71,0.12)",borderRadius:3,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontFamily:"Space Mono,monospace",fontSize:20,fontWeight:700,color:C.acc}}>{s.v}</div>
                  <div style={{...st,color:C.muted,marginTop:2,fontSize:7}}>{s.l}</div>
                </div>
              ))}
            </div>
            {data.pbList?.length>0&&<Sec title="PERSONAL BESTS">{data.pbList.map((pb,i)=><Item key={i} icon="🏆" text={pb}/>)}</Sec>}
            {data.error?<div style={{color:C.red,fontSize:13,textAlign:"center",padding:12}}>Could not get AI analysis. Stats saved.</div>:<>
              {data.pros?.length>0&&<Sec title="WHAT WENT WELL">{data.pros.map((p,i)=><Item key={i} icon={p.icon} text={p.text}/>)}</Sec>}
              {data.build?.length>0&&<Sec title="FOCUS NEXT TIME">{data.build.map((b,i)=><Item key={i} icon={b.icon} text={b.text}/>)}</Sec>}
              {data.next_targets?.length>0&&<Sec title="NEXT SESSION TARGETS">
                {data.next_targets.map((nt,i)=>(
                  <div key={i} style={{background:"rgba(232,255,71,0.04)",border:"1px solid rgba(232,255,71,0.1)",borderRadius:3,padding:"8px 10px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div><div style={{fontSize:12,fontWeight:500}}>{nt.exercise}</div>{nt.today&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>Today: {nt.today}</div>}</div>
                    <div style={{fontFamily:"Space Mono,monospace",fontSize:12,color:C.acc,fontWeight:700,whiteSpace:"nowrap"}}>{nt.target}</div>
                  </div>
                ))}
              </Sec>}
              {data.coach_note&&<Sec title="COACH NOTE"><div style={{fontSize:13,color:C.muted,lineHeight:1.7,padding:"6px 0"}}>{data.coach_note}</div></Sec>}
            </>}
          </>}
        </div>
      )}
    </div>
  );
}
function Sec({title,children}){
  const st={fontSize:8,letterSpacing:3,textTransform:"uppercase",fontFamily:"Space Mono,monospace"};
  return(
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{...st,color:C.acc,fontSize:7}}>{title}</span>
        <div style={{flex:1,height:1,background:"rgba(232,255,71,0.1)"}}/>
      </div>
      {children}
    </div>
  );
}
function Item({icon,text}){
  return(
    <div style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid rgba(30,30,50,0.8)",fontSize:13,lineHeight:1.5}}>
      <span style={{flexShrink:0}}>{icon}</span>
      <span>{text}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
